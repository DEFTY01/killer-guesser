name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Type-check & lint ─────────────────────────────────────────────
  type-check:
    name: Type check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── Unit tests ────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run unit tests
        run: npm run test -- --reporter=verbose

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  # ── Build ─────────────────────────────────────────────────────────
  build:
    name: Next.js build
    runs-on: ubuntu-latest
    env:
      TURSO_DATABASE_URL: "file:ci.db"
      AUTH_SECRET: "ci-secret-not-for-production-at-all"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Initialise local database schema
        run: npx drizzle-kit push --force

      - name: Build
        run: npm run build

  # ── E2E tests ─────────────────────────────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    env:
      TURSO_DATABASE_URL: "file:ci.db"
      AUTH_SECRET: "ci-secret-not-for-production-at-all"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Initialise local database schema
        run: npx drizzle-kit push --force

      - name: Build app
        run: npm run build

      - name: Run E2E tests (Chromium only)
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
